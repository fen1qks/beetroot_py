{% extends 'base.html' %}

{% block title %}Видалення{% endblock %}

{% block content %}
    <div class="container">
        <h2>Видалення</h2>
        <p>Ви впевнені, що хочете видалити "{{ object }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Так, видалити</button>
            <a href="{% url 'notes_page' %}" class="btn btn-info">Скасувати</a>
        </form>
    </div>
{% endblock %}
